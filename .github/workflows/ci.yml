name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Unit tests
        env:
          OMP_NUM_THREADS: "1"
        # env -u GITHUB_ACTIONS: typer forces color output when GITHUB_ACTIONS is
        # set, and the ANSI escape codes break the CLI help-text assertions.
        run: env -u GITHUB_ACTIONS pytest tests/unit -q
